<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahuna</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: linear-gradient(160deg, #0e3d52 0%, #061e30 55%, #0b2818 100%);
  color:#e8d5a3; font-family:'Georgia',serif; padding:10px;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
}
h1 {
  text-align:center; font-size:2.6rem; color:#f0c060;
  letter-spacing:10px; font-weight:900; margin-bottom:0;
  text-shadow: 0 0 30px rgba(240,192,96,0.4), 0 2px 4px rgba(0,0,0,0.6);
}
.subtitle { text-align:center; font-size:0.7rem; color:#5a8a70; letter-spacing:3px; margin-bottom:8px; font-family:'Segoe UI',sans-serif; }
.mode-selector { display:flex; gap:10px; justify-content:center; margin-bottom:8px; align-items:center; }
.select-wrap { position:relative; display:inline-flex; align-items:center; }
.select-wrap::after { content:'▾'; position:absolute; right:10px; pointer-events:none; color:#f0c060; font-size:1rem; }
.mode-select {
  background:#0a1f12; border:2px solid #4a7a50; color:#a0c878;
  border-radius:8px; padding:5px 28px 5px 14px; font-size:0.75rem;
  font-weight:bold; cursor:pointer; letter-spacing:1px;
  appearance:none; -webkit-appearance:none; outline:none; font-family:'Segoe UI',sans-serif;
}
.btn {
  background:transparent; border:2px solid #2a5a3a; color:#5a8a60;
  border-radius:8px; padding:5px 14px; font-size:0.75rem; font-weight:bold;
  cursor:pointer; letter-spacing:1px; transition:all 0.15s; font-family:'Segoe UI',sans-serif;
}
.btn:hover { border-color:#f0c060; color:#f0c060; }
.btn.active { border-color:#4a7a50; color:#a0c878; background:#0a1f12; }
.btn.go { border-color:#c8860a; color:#f0c060; background:rgba(200,134,10,0.12); }
.btn.go:hover { background:#c8860a; color:#fff; }
.score-panel { display:flex; justify-content:center; gap:48px; margin-bottom:6px; }
.score-item { text-align:center; min-width:80px; }
.score-name { font-size:0.65rem; letter-spacing:2px; font-family:'Segoe UI',sans-serif; }
.score-val { font-size:1.8rem; font-weight:900; line-height:1; }
.score-islands { font-size:0.65rem; color:#4a6a50; font-family:'Segoe UI',sans-serif; }
.status-bar {
  text-align:center; font-size:0.85rem; font-weight:600; min-height:22px;
  margin-bottom:6px; font-family:'Segoe UI',sans-serif; color:#a0b890;
}
.scoring-banner {
  text-align:center; background:rgba(10,30,15,0.9); border:2px solid #c8860a;
  border-radius:10px; padding:10px 24px; margin-bottom:6px; display:none;
  font-size:0.82rem; font-family:'Segoe UI',sans-serif;
  box-shadow:0 0 20px rgba(200,134,10,0.3);
}
.scoring-banner h3 { color:#f0c060; font-size:0.75rem; letter-spacing:2px; margin-bottom:4px; }
.board-wrap {
  border-radius:12px; border:3px solid #1a4a2a; margin-bottom:10px; overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
}
/* Market + deck row */
.market-row { display:flex; align-items:flex-end; gap:10px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
.mlabel { font-size:0.62rem; color:#4a6a50; letter-spacing:2px; font-family:'Segoe UI',sans-serif; align-self:center; }
.deck-btn {
  width:52px; height:52px; border-radius:8px;
  background:linear-gradient(160deg,#0c1a10,#081408);
  border:2px solid #2a4a30; cursor:pointer; align-self:center;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; color:#4a7a50; transition:all 0.12s; font-weight:bold; font-family:'Segoe UI',sans-serif;
}
.deck-btn:hover { border-color:#f0c060; color:#f0c060; }
.deck-btn.draw-active { border-color:#f0c060; box-shadow:0 0 12px rgba(240,192,96,0.45); color:#f0c060; }
.deck-btn.empty { cursor:default; opacity:0.25; }
/* Portrait cards (hand + market) */
.hands-wrap { width:100%; max-width:760px; }
.player-area { margin-bottom:10px; }
.player-label { font-size:0.62rem; letter-spacing:2px; margin-bottom:5px; font-family:'Segoe UI',sans-serif; }
.hand { display:flex; gap:7px; flex-wrap:wrap; min-height:100px; }
.card {
  width:72px; height:100px; border-radius:8px;
  background:linear-gradient(175deg,#1c110a,#0e1c0a);
  border:2px solid #5a3e1a; display:flex; flex-direction:column;
  align-items:stretch; cursor:pointer; user-select:none;
  transition:all 0.12s; overflow:hidden;
  box-shadow:2px 3px 10px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,220,120,0.07);
}
.card:hover { border-color:#f0c060; transform:translateY(-5px); box-shadow:2px 8px 20px rgba(0,0,0,0.55); }
.card.sel {
  border-color:#f0c060;
  box-shadow:0 0 0 2px #f0c060, 0 0 20px rgba(240,192,96,0.55), 2px 10px 22px rgba(0,0,0,0.55);
  transform:translateY(-8px);
}
.card.draw-active { border-color:#f0c060; box-shadow:0 0 0 2px #f0c060, 0 0 12px rgba(240,192,96,0.4); }
.card.draw-active:hover { transform:translateY(-5px); }
.card.facedown { cursor:default; border-color:#1a2a1a; }
.card.facedown:hover { transform:none; box-shadow:2px 3px 10px rgba(0,0,0,0.55); }
.card-map { flex:1; display:block; }
.card-name {
  text-align:center; font-size:0.55rem; font-weight:900; letter-spacing:1px;
  font-family:'Segoe UI',sans-serif; color:#a07840;
  padding:3px 2px 4px; border-top:1px solid #3a2810; background:rgba(0,0,0,0.28);
}
.card.sel .card-name { color:#f0c060; }
.card.draw-active .card-name { color:#f0c060; }
.actions { display:flex; gap:8px; justify-content:center; margin-bottom:8px; flex-wrap:wrap; min-height:32px; }
.legend { margin-top:6px; font-size:0.63rem; color:#2a4a30; text-align:center; line-height:2; max-width:660px; font-family:'Segoe UI',sans-serif; }
.legend span { color:#3a6a40; }
</style>
</head>
<body>
<h1>KAHUNA</h1>
<p class="subtitle">POLYNESIAN ISLAND STRATEGY · 2 PLAYERS</p>
<div class="mode-selector">
  <div class="select-wrap">
    <select class="mode-select" id="mode-sel" onchange="setMode(this.value)">
      <option value="2p">2 PLAYERS</option>
      <option value="ai" selected>VS BOT</option>
    </select>
  </div>
  <button class="btn active" id="snd-btn" onclick="toggleSound()">♪ SOUND</button>
</div>
<div class="score-panel" id="score-panel"></div>
<div class="status-bar" id="status-bar"></div>
<div class="scoring-banner" id="scoring-banner"></div>
<div class="board-wrap">
  <svg id="board" width="570" height="500" viewBox="5 100 458 402" style="display:block"></svg>
</div>
<div class="market-row" id="market-row"></div>
<div class="hands-wrap" id="hands-wrap"></div>
<div class="actions" id="actions"></div>
<div class="legend">
  <span>Select a card</span> then click a glowing route to place a bridge ·
  <span>Select 2 cards</span> naming both ends of an enemy bridge to remove it ·
  <span>Draw a card</span> from the market or deck to end your turn
</div>
<script>
// ---- Constants ----
const ISLANDS = ['LALE','IFFI','HUNA','KAHU','JOJO','GOLA','FAAA','COCO','BARI','ELAI','DUDA','ALOA'];

const CONNS = [
  [0,1],[0,2],[0,4],
  [1,2],[1,4],[1,9],
  [2,10],[2,11],
  [3,4],[3,5],
  [4,5],[4,6],
  [5,6],[5,7],
  [6,8],[6,9],
  [7,8],
  [8,9],[8,11],
  [9,10],
  [10,11],
];

// Island positions calibrated to kahuna-board.jpg (647×613px, board area ≈ x:5-462 y:100-502)
const POS = [
  {x:238,y:138},  // 0  LALE
  {x:178,y:214},  // 1  IFFI
  {x:338,y:208},  // 2  HUNA
  {x:80, y:248},  // 3  KAHU
  {x:152,y:262},  // 4  JOJO
  {x:86, y:322},  // 5  GOLA
  {x:148,y:370},  // 6  FAAA
  {x:58, y:402},  // 7  COCO
  {x:220,y:402},  // 8  BARI
  {x:264,y:338},  // 9  ELAI
  {x:338,y:326},  // 10 DUDA
  {x:402,y:418},  // 11 ALOA
];

const DEG = new Array(12).fill(0);
CONNS.forEach(([a,b])=>{ DEG[a]++; DEG[b]++; });
const MAJ = DEG.map(d => Math.floor(d/2)+1);

const PC      = ['#f97316','#22d3ee'];
const PC_GLOW = ['rgba(249,115,22,0.4)','rgba(34,211,238,0.4)'];

// ---- Audio ----
let audioCtx=null, soundOn=true;
function ensureAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
document.addEventListener('pointerdown',ensureAudio,true);
function ga(){ ensureAudio(); return audioCtx; }
function toggleSound(){
  soundOn=!soundOn;
  const b=document.getElementById('snd-btn');
  b.textContent=soundOn?'♪ SOUND':'♪ OFF';
  b.classList.toggle('active',soundOn);
}
function sndClick(){
  if(!soundOn) return;
  const ctx=ga(),t=ctx.currentTime;
  const g=2+(Math.random()<0.4?1:0);
  for(let i=0;i<g;i++){
    const dt=i*0.006;
    const len=Math.floor(ctx.sampleRate*0.01);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<len;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/len,2);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=2500+Math.random()*2000;
    const gn=ctx.createGain(); gn.gain.value=0.3;
    src.connect(hpf); hpf.connect(gn); gn.connect(ctx.destination);
    src.start(t+dt); src.stop(t+dt+0.01);
  }
}
function sndCapture(){
  if(!soundOn) return;
  const ctx=ga(),t=ctx.currentTime;
  [400,500,630].forEach((f,i)=>{
    const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.14,t+i*0.09);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.09+0.18);
    o.connect(g); g.connect(ctx.destination);
    o.start(t+i*0.09); o.stop(t+i*0.09+0.2);
  });
}
function sndScore(){
  if(!soundOn) return;
  const ctx=ga(),t=ctx.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.1,t+i*0.13);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.13+0.22);
    o.connect(g); g.connect(ctx.destination);
    o.start(t+i*0.13); o.stop(t+i*0.13+0.25);
  });
}

// ---- State ----
let deck,market,hands,bridges,controlled,scores,
    curP,subphase,totalDraws,selCards,vsAI,aiThinking,pnames,scored;
// subphase: 'play' | 'over'

function setMode(v){
  vsAI = v!=='2p';
  pnames = vsAI ? ['You','Bot'] : ['Player 1','Player 2'];
  initGame();
}

function initGame(){
  deck=[];
  for(let i=0;i<12;i++){ deck.push(i); deck.push(i); }
  shuffle(deck);
  hands=[[],[]];
  hands[0]=deck.splice(0,3);
  hands[1]=deck.splice(0,3);
  market=deck.splice(0,3);
  bridges=new Array(CONNS.length).fill(null);
  controlled=new Array(12).fill(null);
  scores=[0,0]; curP=0; subphase='play'; totalDraws=0;
  selCards=[]; aiThinking=false; scored=[false,false,false];
  render();
  if(vsAI&&curP===1) scheduleAI();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// ---- Game Logic ----

function placebridge(handIdx,ci){
  const isl=hands[curP][handIdx];
  if(!CONNS[ci].includes(isl)||bridges[ci]!==null) return false;
  hands[curP].splice(handIdx,1);
  bridges[ci]=curP;
  selCards=[];
  sndClick();
  resolveAll();
  render();
  return true;
}

function removeBridge(h1,h2,ci){
  const [a,b]=CONNS[ci];
  const i1=hands[curP][h1],i2=hands[curP][h2];
  if(!((i1===a&&i2===b)||(i1===b&&i2===a))) return false;
  if(bridges[ci]!==1-curP) return false;
  const hi=Math.max(h1,h2),lo=Math.min(h1,h2);
  hands[curP].splice(hi,1); hands[curP].splice(lo,1);
  bridges[ci]=null;
  selCards=[];
  sndClick();
  resolveAll();
  render();
  return true;
}

function resolveAll(){
  let changed=true;
  while(changed){
    changed=false;
    for(let isl=0;isl<12;isl++){
      const cnt=[0,0];
      CONNS.forEach(([a,b],ci)=>{
        if(a!==isl&&b!==isl) return;
        if(bridges[ci]===0) cnt[0]++; else if(bridges[ci]===1) cnt[1]++;
      });
      const prev=controlled[isl];
      let next=null;
      if(cnt[0]>=MAJ[isl]) next=0; else if(cnt[1]>=MAJ[isl]) next=1;
      if(next!==prev){
        controlled[isl]=next; changed=true;
        if(next!==null){
          const loser=1-next;
          CONNS.forEach(([a,b],ci)=>{ if((a===isl||b===isl)&&bridges[ci]===loser) bridges[ci]=null; });
          sndCapture();
        }
      }
    }
  }
}

// ---- Turn Flow ----
// Drawing a card ends the turn. No explicit "Finish Turn" button.

function drawAndEnd(src){
  if(subphase!=='play') return;
  let drew=false;
  if(src==='deck'){
    if(deck.length&&hands[curP].length<5){ hands[curP].push(deck.shift()); drew=true; }
  } else {
    if(market[src]!==undefined&&hands[curP].length<5){
      hands[curP].push(market[src]);
      market.splice(src,1);
      if(deck.length) market.push(deck.shift());
      drew=true;
    }
  }
  if(drew){ totalDraws++; checkScoring(); }
  doEndTurn();
}

function checkScoring(){
  [5,10,15].forEach((th,ph)=>{
    if(!scored[ph]&&totalDraws>=th){ scored[ph]=true; doScoring(ph+1); }
  });
}

function doScoring(phase){
  const ic=[0,0];
  controlled.forEach(c=>{ if(c===0)ic[0]++; else if(c===1)ic[1]++; });
  let pts=0,winner=-1;
  if(phase===1) pts=1; else if(phase===2) pts=2; else pts=Math.abs(ic[0]-ic[1]);
  if(ic[0]>ic[1]) winner=0; else if(ic[1]>ic[0]) winner=1;
  if(winner>=0) scores[winner]+=(phase<3?pts:(ic[winner]-ic[1-winner]));
  sndScore();
  const banner=document.getElementById('scoring-banner');
  const label=['FIRST SCORING  ·  1 POINT','SECOND SCORING  ·  2 POINTS','FINAL SCORING'][phase-1];
  const res=winner>=0
    ?`${pnames[winner]} leads ${ic[winner]}–${ic[1-winner]} islands → +${phase<3?pts:Math.abs(ic[0]-ic[1])} pt${pts!==1?'s':''}`
    :`Tied ${ic[0]}–${ic[1]} islands — no points`;
  banner.innerHTML=`<h3>${label}</h3>${res}`;
  banner.style.display='block';
  setTimeout(()=>banner.style.display='none',3500);
}

function doEndTurn(){
  selCards=[];
  if(isGameOver()){
    subphase='over';
    [1,2,3].forEach((ph,i)=>{ if(!scored[i]){ scored[i]=true; doScoring(ph+1); } });
    render(); return;
  }
  curP=1-curP; subphase='play';
  render();
  if(vsAI&&curP===1) scheduleAI();
}

function isGameOver(){
  return deck.length===0&&market.length===0&&hands[0].length===0&&hands[1].length===0;
}

// ---- Interaction ----

function handleCard(ci){
  if(subphase!=='play'||aiThinking||(vsAI&&curP===1)) return;
  const idx=selCards.indexOf(ci);
  if(idx>=0){ selCards.splice(idx,1); render(); return; }
  if(selCards.length===0){ selCards=[ci]; render(); return; }
  if(selCards.length===1){
    const i1=hands[curP][selCards[0]],i2=hands[curP][ci];
    const connIdx=findConn(i1,i2);
    selCards=(connIdx>=0&&bridges[connIdx]===1-curP)?[selCards[0],ci]:[ci];
    render(); return;
  }
  selCards=[ci]; render();
}

function handleConn(ci){
  if(vsAI&&curP===1) return;
  if(selCards.length===1) placebridge(selCards[0],ci);
  else if(selCards.length===2) removeBridge(selCards[0],selCards[1],ci);
}

function findConn(ia,ib){
  return CONNS.findIndex(([a,b])=>(a===ia&&b===ib)||(a===ib&&b===ia));
}

// ---- AI ----

function scheduleAI(){
  aiThinking=true; render();
  setTimeout(doAITurn,700);
}

function doAITurn(){
  aiThinking=false;
  const move=findBestMove();
  if(move){
    if(move.type==='place') placebridge(move.h,move.ci);
    else removeBridge(move.h1,move.h2,move.ci);
    render();
  }
  setTimeout(()=>{
    if(hands[1].length<5&&(deck.length>0||market.length>0)) drawAndEnd(bestDraw());
    else doEndTurn();
  },500);
}

function findBestMove(){
  let best=-Infinity,bestMove=null;
  const hand=hands[1];
  hand.forEach((isl,hi)=>{
    CONNS.forEach(([a,b],ci)=>{
      if(a!==isl&&b!==isl||bridges[ci]!==null) return;
      const sc=evalPlace(ci,1);
      if(sc>best){ best=sc; bestMove={type:'place',h:hi,ci}; }
    });
  });
  for(let i=0;i<hand.length;i++){
    for(let j=i+1;j<hand.length;j++){
      const ci=findConn(hand[i],hand[j]);
      if(ci<0||bridges[ci]!==0) continue;
      const sc=evalRemove(ci,1)+3;
      if(sc>best){ best=sc; bestMove={type:'remove',h1:i,h2:j,ci}; }
    }
  }
  return bestMove;
}

function evalPlace(ci,player){
  const opp=1-player; let score=0;
  CONNS[ci].forEach(isl=>{
    const cnt=[0,0];
    CONNS.forEach(([a,b],c2)=>{
      if(a!==isl&&b!==isl) return;
      const br=c2===ci?player:bridges[c2];
      if(br===0) cnt[0]++; else if(br===1) cnt[1]++;
    });
    const maj=MAJ[isl];
    if(cnt[player]>=maj) score+=12; else score+=(cnt[player]/maj)*4;
    if(cnt[opp]===maj-1) score+=5;
    if(controlled[isl]===opp) score+=4;
    score+=DEG[isl]*0.3;
  });
  return score;
}

function evalRemove(ci,player){
  const opp=1-player; let score=0;
  CONNS[ci].forEach(isl=>{
    const cnt=[0,0];
    CONNS.forEach(([a,b],c2)=>{
      if(a!==isl&&b!==isl) return;
      const br=c2===ci?null:bridges[c2];
      if(br===0) cnt[0]++; else if(br===1) cnt[1]++;
    });
    if(controlled[isl]===opp&&cnt[opp]<MAJ[isl]) score+=8;
    if(cnt[opp]<MAJ[isl]) score+=4;
    score+=DEG[isl]*0.3;
  });
  return score;
}

function bestDraw(){
  if(market.length===0) return 'deck';
  let best=-Infinity,bidx=0;
  market.forEach((isl,mi)=>{
    let val=0;
    CONNS.forEach(([a,b],ci)=>{
      if(a!==isl&&b!==isl) return;
      if(bridges[ci]===null) val+=1;
      if(bridges[ci]===0) val+=0.3;
    });
    const cnt=[0,0];
    CONNS.forEach(([a,b],ci)=>{
      if(a!==isl&&b!==isl) return;
      if(bridges[ci]===0) cnt[0]++; else if(bridges[ci]===1) cnt[1]++;
    });
    if(cnt[1]===MAJ[isl]-1) val+=6;
    if(val>best){ best=val; bidx=mi; }
  });
  return best>0.5?bidx:'deck';
}

// ---- Card mini-map (uses the actual board image) ----
function cardMiniMap(hl,isSel){
  const p=POS[hl];
  const ring=isSel?'#f0c060':'#c89030';
  const fill=isSel?'rgba(240,192,96,0.35)':'rgba(180,120,20,0.3)';
  // Same viewBox as the main board so coordinates match
  return `<svg class="card-map" viewBox="5 100 458 402" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <image href="kahuna-board.jpg" x="0" y="0" width="647" height="613"/>
    <circle cx="${p.x}" cy="${p.y}" r="30" fill="${fill}" stroke="${ring}" stroke-width="6" opacity="0.9"/>
    <circle cx="${p.x}" cy="${p.y}" r="14" fill="${ring}" opacity="0.7"/>
  </svg>`;
}

// ---- Render ----

function render(){
  renderScores(); renderStatus(); renderBoard(); renderMarket(); renderHands(); renderActions();
}

function renderScores(){
  const ic=[0,0];
  controlled.forEach(c=>{ if(c===0)ic[0]++; else if(c===1)ic[1]++; });
  document.getElementById('score-panel').innerHTML=pnames.map((n,i)=>
    `<div class="score-item">
      <div class="score-name" style="color:${PC[i]}">${n.toUpperCase()}</div>
      <div class="score-val" style="color:${PC[i]}">${scores[i]}</div>
      <div class="score-islands">${ic[i]} island${ic[i]!==1?'s':''}</div>
    </div>`).join('');
}

function renderStatus(){
  const el=document.getElementById('status-bar');
  if(subphase==='over'){
    const w=scores[0]>scores[1]?0:scores[1]>scores[0]?1:-1;
    el.innerHTML=w>=0
      ?`Game over — <strong style="color:${PC[w]}">${pnames[w]} wins ${scores[w]}–${scores[1-w]}!</strong>`
      :`Game over — Tie! ${scores[0]}–${scores[1]}`;
    el.style.color='#f0c060'; return;
  }
  if(aiThinking){ el.textContent=`${pnames[1]} is thinking…`; el.style.color='#4a8a60'; return; }
  if(selCards.length===0) el.textContent=`${pnames[curP]}'s turn — play cards, then draw to end your turn`;
  else if(selCards.length===1) el.textContent=`${ISLANDS[hands[curP][selCards[0]]]} — click a glowing route to place a bridge`;
  else el.textContent=`Two cards selected — click the enemy bridge to remove it`;
  el.style.color=PC[curP];
}

function renderBoard(){
  const svg=document.getElementById('board');
  const validSet=new Set(),remSet=new Set();
  if(subphase==='play'&&!aiThinking&&!(vsAI&&curP===1)){
    if(selCards.length===1){
      const isl=hands[curP][selCards[0]];
      CONNS.forEach(([a,b],ci)=>{ if((a===isl||b===isl)&&bridges[ci]===null) validSet.add(ci); });
    } else if(selCards.length===2){
      const i1=hands[curP][selCards[0]],i2=hands[curP][selCards[1]];
      const ci=findConn(i1,i2);
      if(ci>=0&&bridges[ci]===1-curP) remSet.add(ci);
    }
  }

  let h='';

  // Background: the actual Kahuna board photo
  h+=`<image href="kahuna-board.jpg" x="0" y="0" width="647" height="613" preserveAspectRatio="xMidYMid meet"/>`;

  // Placed & highlighted bridges
  CONNS.forEach(([a,b],ci)=>{
    const pa=POS[a],pb=POS[b];
    const br=bridges[ci];
    const isV=validSet.has(ci),isR=remSet.has(ci);

    // Invisible wide hit area
    h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="transparent" stroke-width="22" style="cursor:${isV||isR?'pointer':'default'}" data-ci="${ci}" class="chit"/>`;

    if(isV){
      h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="rgba(240,192,96,0.22)" stroke-width="12" stroke-linecap="round" pointer-events="none"/>`;
      h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="#f0c060" stroke-width="3" stroke-dasharray="9 6" stroke-linecap="round" pointer-events="none"/>`;
    }
    if(br!==null){
      const col=PC[br],glow=PC_GLOW[br];
      // Shadow
      h+=`<line x1="${pa.x+1}" y1="${pa.y+3}" x2="${pb.x+1}" y2="${pb.y+3}" stroke="rgba(0,0,0,0.55)" stroke-width="7" stroke-linecap="round" pointer-events="none"/>`;
      // Glow halo
      h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${glow}" stroke-width="13" stroke-linecap="round" pointer-events="none"/>`;
      // Bridge line
      h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${col}" stroke-width="5" stroke-linecap="round" pointer-events="none"/>`;
      if(isR){
        h+=`<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="rgba(250,80,80,0.85)" stroke-width="8" stroke-dasharray="6 5" stroke-linecap="round" pointer-events="none"/>`;
      }
    }
  });

  // Island control markers (colored disc + glow)
  for(let i=0;i<12;i++){
    const p=POS[i],ctrl=controlled[i];
    if(ctrl===null) continue;
    const col=PC[ctrl],glow=PC_GLOW[ctrl];
    // Outer glow
    h+=`<circle cx="${p.x}" cy="${p.y}" r="16" fill="${glow}" pointer-events="none"/>`;
    // Disc
    h+=`<circle cx="${p.x}" cy="${p.y}" r="11" fill="${col}" stroke="rgba(255,255,255,0.65)" stroke-width="2" pointer-events="none"/>`;
    // Player indicator (1 or 2 dot)
    h+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="rgba(0,0,0,0.4)" pointer-events="none"/>`;
  }

  svg.innerHTML=h;
  svg.querySelectorAll('.chit').forEach(el=>{
    const ci=parseInt(el.dataset.ci);
    if(validSet.has(ci)||remSet.has(ci)) el.addEventListener('click',()=>handleConn(ci));
  });
}

function renderMarket(){
  const el=document.getElementById('market-row');
  // Market is always active during play phase for the current human player
  const canDraw=subphase==='play'&&!aiThinking&&!(vsAI&&curP===1);
  let h=`<span class="mlabel">MARKET</span>`;
  for(let i=0;i<3;i++){
    if(i<market.length){
      h+=`<div class="card${canDraw?' draw-active':''}" data-mi="${i}">${cardMiniMap(market[i],false)}<div class="card-name" style="color:${canDraw?'#f0c060':'#a07840'}">${ISLANDS[market[i]]}</div></div>`;
    } else {
      h+=`<div class="card" style="cursor:default;opacity:0.18"><svg class="card-map" viewBox="5 100 458 402"><image href="kahuna-board.jpg" x="0" y="0" width="647" height="613"/></svg><div class="card-name">—</div></div>`;
    }
  }
  h+=`<span class="mlabel" style="margin-left:14px">DECK</span>`;
  if(deck.length>0){
    h+=`<div class="deck-btn${canDraw?' draw-active':''}" id="deck-btn">${deck.length}</div>`;
  } else {
    h+=`<div class="deck-btn empty">0</div>`;
  }
  el.innerHTML=h;
  if(canDraw){
    el.querySelectorAll('.card.draw-active').forEach(c=>c.addEventListener('click',()=>drawAndEnd(parseInt(c.dataset.mi))));
    const db=el.querySelector('#deck-btn');
    if(db) db.addEventListener('click',()=>drawAndEnd('deck'));
  }
}

function renderHands(){
  const el=document.getElementById('hands-wrap');
  const parts=pnames.map((name,pi)=>{
    const hand=hands[pi];
    const showFace=!vsAI||pi===0||subphase==='over';
    let cardsHTML='';
    if(showFace){
      hand.forEach((isl,ci)=>{
        const isSel=pi===curP&&selCards.includes(ci);
        cardsHTML+=`<div class="card${isSel?' sel':''}" data-pi="${pi}" data-ci="${ci}">${cardMiniMap(isl,isSel)}<div class="card-name">${ISLANDS[isl]}</div></div>`;
      });
    } else {
      hand.forEach(()=>{
        cardsHTML+=`<div class="card facedown"><svg class="card-map" viewBox="5 100 458 402"><image href="kahuna-board.jpg" x="0" y="0" width="647" height="613"/><rect x="5" y="100" width="458" height="402" fill="rgba(0,0,0,0.55)"/><text x="234" y="302" text-anchor="middle" dominant-baseline="middle" fill="#2a5a4a" font-size="60" font-family="sans-serif">?</text></svg><div class="card-name" style="color:#1a3a2a">· · ·</div></div>`;
      });
    }
    if(!cardsHTML) cardsHTML=`<span style="font-size:0.65rem;color:#2a4a30;align-self:center">—</span>`;
    return `<div class="player-area">
      <div class="player-label" style="color:${PC[pi]}">${name.toUpperCase()} · ${hand.length} CARD${hand.length!==1?'S':''}</div>
      <div class="hand">${cardsHTML}</div>
    </div>`;
  });
  el.innerHTML=parts.join('');
  if(subphase==='play'&&!aiThinking&&!(vsAI&&curP===1)){
    el.querySelectorAll(`.card:not(.facedown)[data-pi="${curP}"]`).forEach(c=>{
      c.addEventListener('click',()=>handleCard(parseInt(c.dataset.ci)));
    });
  }
}

function renderActions(){
  const el=document.getElementById('actions');
  el.innerHTML='';
  if(subphase==='over'){
    const b=document.createElement('button');
    b.className='btn go'; b.textContent='NEW GAME'; b.onclick=initGame;
    el.appendChild(b); return;
  }
  if((vsAI&&curP===1)||aiThinking) return;
  if(subphase==='play'){
    // Only show END TURN when hand is full or nothing to draw (can't draw normally)
    if(hands[curP].length>=5||(deck.length===0&&market.length===0)){
      const b=document.createElement('button');
      b.className='btn go'; b.textContent='END TURN'; b.onclick=doEndTurn;
      el.appendChild(b);
    }
    if(selCards.length>0){
      const c=document.createElement('button');
      c.className='btn'; c.textContent='DESELECT'; c.onclick=()=>{ selCards=[]; render(); };
      el.appendChild(c);
    }
  }
}

// ---- Boot ----
vsAI=true; pnames=['You','Bot'];
initGame();
</script>
</body>
</html>
